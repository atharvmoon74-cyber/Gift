<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For My Bestie 💖</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>

/* GLOBAL */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background: radial-gradient(circle at top, #ff6ec4, #7873f5, #000);
  height:100vh;
  overflow:hidden;
  color:white;
}

/* LOADER */
.loader{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:2rem;
  z-index:9999;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{opacity:0.5;}
  50%{opacity:1;}
  100%{opacity:0.5;}
}

/* MAIN CONTAINER */
.container{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
  opacity:0;
  transform:translateY(40px);
  transition:1s;
}

.container.show{
  opacity:1;
  transform:translateY(0);
}

/* TITLE */
h1{
  font-size:2.5rem;
  margin-bottom:40px;
  text-shadow:0 0 20px pink;
  animation: glow 2s infinite alternate;
}

@keyframes glow{
  from{ text-shadow:0 0 10px pink; }
  to{ text-shadow:0 0 30px white; }
}

/* BUTTONS */
button{
  width:260px;
  padding:15px;
  margin:10px;
  border:none;
  border-radius:50px;
  font-size:1.1rem;
  cursor:pointer;
  transition:0.4s;
  position:relative;
  overflow:hidden;
}

/* DIFFERENT STYLES */
button:nth-child(2){
  background:linear-gradient(45deg,#00f5a0,#00d9f5);
}
button:nth-child(3){
  background:linear-gradient(45deg,#ff9a9e,#fad0c4);
}
button:nth-child(4){
  background:linear-gradient(45deg,#ffd700,#ff8c00);
  color:black;
}

/* HOVER MAGIC */
button:hover{
  transform:scale(1.1);
  box-shadow:0 0 30px white;
}

/* RIPPLE EFFECT */
button::after{
  content:"";
  position:absolute;
  width:0;
  height:0;
  background:rgba(255,255,255,0.5);
  border-radius:50%;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  transition:0.5s;
}
button:active::after{
  width:300px;
  height:300px;
}

/* FLOATING PARTICLES */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* SECRET POPUP */
.popup{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  background:rgba(0,0,0,0.8);
  padding:25px;
  border-radius:20px;
  text-align:center;
  transition:0.4s;
}

.popup.show{
  transform:translate(-50%,-50%) scale(1);
}

.popup button{
  margin-top:10px;
  background:gold;
}

</style>
</head>

<body>

<!-- PARTICLES -->
<canvas id="particles"></canvas>

<!-- LOADER -->
<div class="loader" id="loader">Loading Love... 💕</div>

<!-- MAIN -->
<div class="container" id="main">
  <h1>Select Your Role 💫</h1>

  <button onclick="selectOption('bestie')">My Bestie 😄</button>
  <button onclick="selectOption('kuchu')">My KuchuPuchu 🥺</button>
  <button onclick="selectOption('sweetheart')">My Sweetheart ❤️</button>
</div>

<!-- SECRET POPUP -->
<div class="popup" id="popup">
  <h2>Hey 👀</h2>
  <p>You are really special 💖</p>
  <button onclick="closePopup()">Close</button>
</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="music/music.mp3" type="audio/mp3">
</audio>
<script>
const music = document.getElementById("music");

/* LOAD SAVED TIME */
window.addEventListener("load", () => {
  const savedTime = localStorage.getItem("musicTime");
  
  if (savedTime) {
    music.currentTime = savedTime;
  }

  music.play().catch(() => {});
});

/* SAVE TIME CONTINUOUSLY */
setInterval(() => {
  localStorage.setItem("musicTime", music.currentTime);
}, 1000);

/* PLAY ON FIRST CLICK (REQUIRED BY BROWSER) */
window.addEventListener("click", () => {
  music.play();
}, { once: true });
</script>

<script>

/* LOADER */
setTimeout(()=>{
  document.getElementById("loader").style.display="none";
  document.getElementById("main").classList.add("show");
},2500);

/* MUSIC FIX */
window.addEventListener("click",()=>{
  document.getElementById("bgMusic").play();
});

/* BUTTON ACTION */
function selectOption(type){
  document.body.style.opacity="0";

  setTimeout(()=>{
    if(type === "sweetheart"){
      window.location.href = "home.html";
    }
    else if(type === "bestie"){
      window.location.href = "bestie.html";
    }
    else if(type === "kuchu"){
      window.location.href = "kuchu.html";
    }
  },800);
}

/* SECRET POPUP */
setTimeout(()=>{
  document.getElementById("popup").classList.add("show");
},5000);

function closePopup(){
  document.getElementById("popup").classList.remove("show");
}

/* PARTICLES */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<60;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*3,
    dx:Math.random()-0.5,
    dy:Math.random()-0.5
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle="white";
    ctx.fill();

    p.x+=p.dx;
    p.y+=p.dy;

    if(p.x<0||p.x>canvas.width) p.dx*=-1;
    if(p.y<0||p.y>canvas.height) p.dy*=-1;
  });
  requestAnimationFrame(animate);
}
animate();

</script>
<script>
window.addEventListener("click", () => {
  const music = document.getElementById("music");
  music.muted = false;
  music.play();
}, { once: true });
</script>
<audio id="music" loop>
  <source src="music/music.mp3" type="audio/mp3">
</audio>
<script>
window.addEventListener("load", () => {
  const music = document.getElementById("music");

  setTimeout(() => {
    music.muted = false;
    music.play();
  }, 1000);
});
</script>
</body>
</html>
